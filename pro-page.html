<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Max Chopiak Professional Page">
  <meta name="author" content="Max Chopiak">

  <title>Max Chopiak CV</title>
  <link href="img/icon-eye.png" rel="icon" type="image/png" sizes="32x32">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    .cv-frame {
      position: relative;
      width: 100%;
      height: 0;
      padding-top: 255.6369%;
      overflow: hidden;
      background: #ffffff;
    }

    .cv-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      margin: 0;
      padding: 0;
      display: block;
    }

    @media (max-width: 1400px) {
      .cv-frame {
        padding-top: 270%;
      }
    }

    @media (max-width: 1200px) {
      .cv-frame {
        padding-top: 290%;
      }
    }

    @media (max-width: 992px) {
      .cv-frame {
        padding-top: 320%;
      }
    }

    @media (max-width: 768px) {
      .cv-frame {
        padding-top: 380%;
      }
    }

    @media (max-width: 576px) {
      .cv-frame {
        padding-top: 440%;
      }
    }

    @media (max-width: 420px) {
      .cv-frame {
        padding-top: 500%;
      }
    }
  </style>
</head>
<body>
  <div class="cv-frame">
    <iframe
      loading="lazy"
      src="https://www.canva.com/design/DAHE5lcuT_Y/lG0wqnEtZMpZfPU9qinE2w/view?embed"
      allowfullscreen="allowfullscreen"
      allow="fullscreen">
    </iframe>
  </div>
</body>
</html>
