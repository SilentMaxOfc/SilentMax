        html, body {
            overflow-x: hidden;
        }

        body {
            background-color: #ffffff;
        }

        .cv-header {
            background: #18BC9C;
            color: #fff;
            padding: 140px 0 60px;
            text-align: center;
        }

        .cv-header h1 {
            margin-top: 0;
            margin-bottom: 15px;
        }

        .cv-header .skills {
            display: block;
            font-size: 22px;
            font-weight: 300;
        }

        .cv-section {
            padding: 60px 0;
            background: #f7f7f7;
        }

        .cv-frame-shell {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .cv-frame {
            position: relative;
            width: 100%;
            height: 0;
            padding-top: 255.6369%;
            overflow: hidden;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        .cv-frame iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            margin: 0;
            padding: 0;
        }

        .cv-actions {
            margin-top: 25px;
            text-align: center;
        }

        .cv-actions .btn {
            margin: 8px;
        }

        .footer-note {
            margin-top: 15px;
        }

        @media (max-width: 1199px) {
            .cv-frame {
                padding-top: 280%;
            }
        }

        @media (max-width: 991px) {
            .cv-header {
                padding: 130px 0 50px;

                padding-top: 320%;
            }
        }

        @media (max-width: 767px) {
            .cv-header {
                padding: 120px 0 40px;

            .cv-header h1 {
                font-size: 38px;
            }

            .cv-header .skills {
                font-size: 18px;
                line-height: 1.5;
                padding: 0 10px;
            }

            .cv-section {
                padding: 40px 0;
            }

            .cv-frame-shell {
                padding: 0 10px;
            }

            .cv-frame {
                padding-top: 380%;
                border-radius: 8px;
            }
        }

        @media (max-width: 575px) {
            .cv-header h1 {
                font-size: 32px;
            }

            .cv-header .skills {
                font-size: 16px;
            }

            .cv-frame {
                padding-top: 430%;
            }
        }

        @media (max-width: 420px) {
            .cv-frame {
                padding-top: 480%;
            }
